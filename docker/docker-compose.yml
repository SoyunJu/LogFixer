version: "3.9"

services:

  mariadb:
    image: mariadb:11.4
    container_name: lf_mariadb
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root1234
      MYSQL_DATABASE: logfixer
      MYSQL_USER: logfixer
      MYSQL_PASSWORD: logfixer1234
    ports:
      - "3306:3306"
    volumes:
      - lf_mariadb_data:/var/lib/mysql

  qdrant:
    image: qdrant/qdrant:v1.12.0
    container_name: lf_qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC
    volumes:
      - lf_qdrant_data:/qdrant/storage

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.3
    container_name: lf_elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false   # 개발용: 인증 OFF
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - lf_es_data:/usr/share/elasticsearch/data

volumes:
  lf_mariadb_data:
  lf_qdrant_data:
  lf_es_data: