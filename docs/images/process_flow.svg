<svg width="680" viewBox="0 0 680 820" xmlns="http://www.w3.org/2000/svg" style="font-family: Arial, sans-serif; background: #ffffff;">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    .th { font-size: 14px; font-weight: 600; fill: #1a1a1a; }
    .ts { font-size: 12px; fill: #555555; }
    .box-purple { fill: #EEEDFE; stroke: #534AB7; }
    .box-teal   { fill: #E1F5EE; stroke: #0F6E56; }
    .box-coral  { fill: #FAECE7; stroke: #993C1D; }
    .box-gray   { fill: #F1EFE8; stroke: #5F5E5A; }
    .box-blue   { fill: #E6F1FB; stroke: #185FA5; }
    .box-amber  { fill: #FAEEDA; stroke: #854F0B; }
    .box-red    { fill: #FCEBEB; stroke: #A32D2D; }
    .text-purple{ fill: #3C3489; }
    .text-teal  { fill: #085041; }
    .text-coral { fill: #712B13; }
    .text-gray  { fill: #444441; }
    .text-blue  { fill: #0C447C; }
    .text-amber { fill: #633806; }
    .text-red   { fill: #791F1F; }
    .arr-line   { fill: none; stroke: #888780; stroke-width: 1.2; }
    .arr-dashed { fill: none; stroke: #b4b2a9; stroke-width: 1; stroke-dasharray: 4 3; }
    .arr-warn   { fill: none; stroke: #D85A30; stroke-width: 1; }
    .arr-retry  { fill: none; stroke: #BA7517; stroke-width: 1; stroke-dasharray: 4 3; }
  </style>
</defs>

<!-- LC (시작) -->
<rect x="240" y="20" width="200" height="44" rx="8" stroke-width="0.5" class="box-teal"/>
<text class="th text-teal" x="340" y="36" text-anchor="middle" dominant-baseline="central">LogCollector</text>
<text class="ts text-teal" x="340" y="54" text-anchor="middle" dominant-baseline="central">POST /api/incident</text>

<line x1="340" y1="64" x2="340" y2="88" class="arr-line" marker-end="url(#arrow)"/>

<!-- ① RECEIVED -->
<rect x="240" y="90" width="200" height="56" rx="8" stroke-width="0.5" class="box-purple"/>
<text class="th text-purple" x="340" y="110" text-anchor="middle" dominant-baseline="central">① RECEIVED</text>
<text class="ts text-purple" x="340" y="128" text-anchor="middle" dominant-baseline="central">DB upsert · 재발 시 재오픈</text>

<line x1="340" y1="146" x2="340" y2="170" class="arr-line" marker-end="url(#arrow)"/>

<!-- ② ANALYZING -->
<rect x="210" y="172" width="260" height="68" rx="8" stroke-width="0.5" class="box-purple"/>
<text class="th text-purple" x="340" y="194" text-anchor="middle" dominant-baseline="central">② ANALYZING</text>
<text class="ts text-purple" x="340" y="212" text-anchor="middle" dominant-baseline="central">ES BM25 + Qdrant kNN → RRF</text>
<text class="ts text-purple" x="340" y="229" text-anchor="middle" dominant-baseline="central">GPT-4o-mini 2-step 분석</text>

<line x1="340" y1="240" x2="340" y2="264" class="arr-line" marker-end="url(#arrow)"/>

<!-- ③ PENDING_APPROVAL -->
<rect x="210" y="266" width="260" height="68" rx="8" stroke-width="0.5" class="box-coral"/>
<text class="th text-coral" x="340" y="288" text-anchor="middle" dominant-baseline="central">③ PENDING_APPROVAL</text>
<text class="ts text-coral" x="340" y="306" text-anchor="middle" dominant-baseline="central">Slack 승인 요청 발송</text>
<text class="ts text-coral" x="340" y="323" text-anchor="middle" dominant-baseline="central">✅ 승인 / ❌ 재분석</text>

<!-- 재분석 루프 (왼쪽) -->
<path d="M210 295 L170 295 L170 118 L238 118" class="arr-dashed" marker-end="url(#arrow)"/>
<text class="ts" style="fill:#888;" x="162" y="208" text-anchor="middle" transform="rotate(-90,162,208)">재분석 요청</text>

<!-- 승인 ↓ -->
<line x1="340" y1="334" x2="340" y2="358" class="arr-line" marker-end="url(#arrow)"/>
<text class="ts" style="fill:#555;" x="358" y="348">승인</text>

<!-- ④ EXECUTING -->
<rect x="210" y="360" width="260" height="80" rx="8" stroke-width="0.5" class="box-purple"/>
<text class="th text-purple" x="340" y="380" text-anchor="middle" dominant-baseline="central">④ EXECUTING</text>
<text class="ts text-purple" x="340" y="398" text-anchor="middle" dominant-baseline="central">SSH 액션 순차 실행</text>
<text class="ts text-purple" x="340" y="414" text-anchor="middle" dominant-baseline="central">RESTART · EDIT_CONFIG</text>
<text class="ts text-purple" x="340" y="430" text-anchor="middle" dominant-baseline="central">CLEAR_MEMORY · DEL_DISK</text>

<!-- 성공 → 오른쪽 -->
<path d="M470 400 L510 400 L510 530 L472 530" class="arr-line" marker-end="url(#arrow)"/>
<text class="ts" style="fill:#555;" x="492" y="468">성공</text>

<!-- 실패 → 왼쪽 -->
<path d="M210 400 L162 400 L162 570 L178 570" class="arr-warn" marker-end="url(#arrow)"/>
<text class="ts" style="fill:#D85A30;" x="152" y="488" text-anchor="middle" transform="rotate(-90,152,488)">실패</text>

<!-- Slack 보고 -->
<rect x="472" y="500" width="150" height="44" rx="8" stroke-width="0.5" class="box-coral"/>
<text class="th text-coral" x="547" y="518" text-anchor="middle" dominant-baseline="central">Slack 보고</text>
<text class="ts text-coral" x="547" y="536" text-anchor="middle" dominant-baseline="central">해결 결과 + 승인 요청</text>

<line x1="547" y1="544" x2="547" y2="568" class="arr-line" marker-end="url(#arrow)"/>
<text class="ts" style="fill:#555;" x="562" y="558">승인</text>

<!-- ⑤ RESOLVED -->
<rect x="472" y="570" width="150" height="80" rx="8" stroke-width="0.5" class="box-teal"/>
<text class="th text-teal" x="547" y="588" text-anchor="middle" dominant-baseline="central">⑤ RESOLVED</text>
<text class="ts text-teal" x="547" y="606" text-anchor="middle" dominant-baseline="central">LC PATCH 상태변경</text>
<text class="ts text-teal" x="547" y="622" text-anchor="middle" dominant-baseline="central">LC GET kbArticleId</text>
<text class="ts text-teal" x="547" y="638" text-anchor="middle" dominant-baseline="central">LC POST addendum</text>

<!-- ⑥ ROLLING_BACK -->
<rect x="178" y="548" width="160" height="56" rx="8" stroke-width="0.5" class="box-amber"/>
<text class="th text-amber" x="258" y="568" text-anchor="middle" dominant-baseline="central">⑥ ROLLING_BACK</text>
<text class="ts text-amber" x="258" y="586" text-anchor="middle" dominant-baseline="central">역순 롤백 실행</text>

<!-- retry < 3 → RECEIVED -->
<path d="M178 568 L130 568 L130 118 L238 118" class="arr-retry" marker-end="url(#arrow)"/>
<text class="ts" style="fill:#BA7517;" x="118" y="350" text-anchor="middle" transform="rotate(-90,118,350)">retry &lt; 3 → 재시도</text>

<!-- retry ≥ 3 ↓ -->
<line x1="258" y1="604" x2="258" y2="638" class="arr-warn" stroke-width="1" marker-end="url(#arrow)"/>
<text class="ts" style="fill:#D85A30;" x="290" y="624">retry ≥ 3</text>

<!-- ⑦ ESCALATED -->
<rect x="178" y="640" width="160" height="44" rx="8" stroke-width="0.5" class="box-red"/>
<text class="th text-red" x="258" y="658" text-anchor="middle" dominant-baseline="central">⑦ ESCALATED</text>
<text class="ts text-red" x="258" y="676" text-anchor="middle" dominant-baseline="central">수동 대응 전환</text>

<!-- addendum → KB 재활용 -->
<path d="M547 650 L547 700 L430 700 L430 740" class="arr-dashed" marker-end="url(#arrow)"/>

<!-- KB addendum -->
<rect x="330" y="742" width="200" height="44" rx="8" stroke-width="0.5" class="box-blue"/>
<text class="th text-blue" x="430" y="760" text-anchor="middle" dominant-baseline="central">KB addendum 저장</text>
<text class="ts text-blue" x="430" y="778" text-anchor="middle" dominant-baseline="central">다음 유사 장애 RAG 활용</text>
</svg>
