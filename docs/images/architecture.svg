<svg width="680" viewBox="0 0 680 540" xmlns="http://www.w3.org/2000/svg" style="font-family: Arial, sans-serif; background: #ffffff;">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    .th { font-size: 14px; font-weight: 600; fill: #1a1a1a; }
    .ts { font-size: 12px; fill: #555555; }
    .box-purple { fill: #EEEDFE; stroke: #534AB7; }
    .box-teal   { fill: #E1F5EE; stroke: #0F6E56; }
    .box-coral  { fill: #FAECE7; stroke: #993C1D; }
    .box-gray   { fill: #F1EFE8; stroke: #5F5E5A; }
    .box-blue   { fill: #E6F1FB; stroke: #185FA5; }
    .box-amber  { fill: #FAEEDA; stroke: #854F0B; }
    .text-purple{ fill: #3C3489; }
    .text-teal  { fill: #085041; }
    .text-coral { fill: #712B13; }
    .text-gray  { fill: #444441; }
    .text-blue  { fill: #0C447C; }
    .text-amber { fill: #633806; }
    .arr-line   { fill: none; stroke: #888780; stroke-width: 1.2; }
    .arr-dashed { fill: none; stroke: #888780; stroke-width: 1; stroke-dasharray: 4 3; }
    .arr-thin   { fill: none; stroke: #b4b2a9; stroke-width: 0.8; stroke-dasharray: 3 3; }
  </style>
</defs>

<!-- LogCollector (좌측 외부) -->
<rect x="20" y="180" width="110" height="56" rx="8" stroke-width="0.5" class="box-teal"/>
<text class="th text-teal" x="75" y="202" text-anchor="middle" dominant-baseline="central">LogCollector</text>
<text class="ts text-teal" x="75" y="220" text-anchor="middle" dominant-baseline="central">장애 감지 · KB 관리</text>

<!-- 대상 서버 (우측 외부) -->
<rect x="550" y="180" width="110" height="56" rx="8" stroke-width="0.5" class="box-teal"/>
<text class="th text-teal" x="605" y="202" text-anchor="middle" dominant-baseline="central">대상 서버</text>
<text class="ts text-teal" x="605" y="220" text-anchor="middle" dominant-baseline="central">systemctl · sed · rm</text>

<!-- LogFixer 컨테이너 -->
<rect x="145" y="20" width="390" height="470" rx="16" fill="none" stroke="#b4b2a9" stroke-width="1" stroke-dasharray="6 4"/>
<text class="th" style="fill:#1a1a1a; font-size:14px; font-weight:700;" x="340" y="44" text-anchor="middle" dominant-baseline="central">LogFixer</text>

<!-- Webhook -->
<rect x="163" y="65" width="100" height="56" rx="8" stroke-width="0.5" class="box-purple"/>
<text class="th text-purple" x="213" y="87" text-anchor="middle" dominant-baseline="central">Webhook</text>
<text class="ts text-purple" x="213" y="105" text-anchor="middle" dominant-baseline="central">POST /api/incident</text>

<!-- Analyzer -->
<rect x="290" y="65" width="100" height="56" rx="8" stroke-width="0.5" class="box-purple"/>
<text class="th text-purple" x="340" y="87" text-anchor="middle" dominant-baseline="central">Analyzer</text>
<text class="ts text-purple" x="340" y="105" text-anchor="middle" dominant-baseline="central">RAG · LLM 분석</text>

<!-- Agent -->
<rect x="417" y="65" width="100" height="56" rx="8" stroke-width="0.5" class="box-purple"/>
<text class="th text-purple" x="467" y="87" text-anchor="middle" dominant-baseline="central">Agent</text>
<text class="ts text-purple" x="467" y="105" text-anchor="middle" dominant-baseline="central">SSH 실행 · 롤백</text>

<!-- MariaDB -->
<rect x="163" y="175" width="100" height="44" rx="8" stroke-width="0.5" class="box-gray"/>
<text class="th text-gray" x="213" y="197" text-anchor="middle" dominant-baseline="central">MariaDB</text>

<!-- Slack -->
<rect x="290" y="175" width="100" height="44" rx="8" stroke-width="0.5" class="box-coral"/>
<text class="th text-coral" x="340" y="197" text-anchor="middle" dominant-baseline="central">Slack</text>

<!-- Reporter -->
<rect x="417" y="175" width="100" height="44" rx="8" stroke-width="0.5" class="box-gray"/>
<text class="th text-gray" x="467" y="197" text-anchor="middle" dominant-baseline="central">Reporter</text>

<!-- RAG 컨테이너 -->
<rect x="163" y="265" width="354" height="100" rx="10" fill="none" stroke="#b4b2a9" stroke-width="0.5" stroke-dasharray="4 3"/>
<text class="ts" style="fill:#888780;" x="175" y="282" dominant-baseline="central">RAG</text>

<!-- Elasticsearch -->
<rect x="175" y="290" width="100" height="44" rx="8" stroke-width="0.5" class="box-blue"/>
<text class="th text-blue" x="225" y="305" text-anchor="middle" dominant-baseline="central">Elasticsearch</text>
<text class="ts text-blue" x="225" y="323" text-anchor="middle" dominant-baseline="central">BM25 키워드</text>

<!-- RRF -->
<rect x="290" y="290" width="90" height="44" rx="8" stroke-width="0.5" class="box-blue"/>
<text class="th text-blue" x="335" y="305" text-anchor="middle" dominant-baseline="central">RRF</text>
<text class="ts text-blue" x="335" y="323" text-anchor="middle" dominant-baseline="central">재랭킹</text>

<!-- Qdrant -->
<rect x="397" y="290" width="100" height="44" rx="8" stroke-width="0.5" class="box-blue"/>
<text class="th text-blue" x="447" y="305" text-anchor="middle" dominant-baseline="central">Qdrant</text>
<text class="ts text-blue" x="447" y="323" text-anchor="middle" dominant-baseline="central">kNN 벡터</text>

<!-- Scheduler -->
<rect x="163" y="410" width="354" height="44" rx="8" stroke-width="0.5" class="box-amber"/>
<text class="th text-amber" x="340" y="425" text-anchor="middle" dominant-baseline="central">Scheduler (APScheduler)</text>
<text class="ts text-amber" x="340" y="443" text-anchor="middle" dominant-baseline="central">EXECUTING 감시 30s · 재발 감지 5m</text>

<!-- 화살표: 상단 내부 수평 -->
<line x1="263" y1="93" x2="288" y2="93" class="arr-line" marker-end="url(#arrow)"/>
<line x1="390" y1="93" x2="415" y2="93" class="arr-line" marker-end="url(#arrow)"/>

<!-- Webhook → DB -->
<line x1="213" y1="121" x2="213" y2="173" class="arr-line" marker-end="url(#arrow)"/>
<!-- Analyzer → Slack -->
<line x1="340" y1="121" x2="340" y2="173" class="arr-line" marker-end="url(#arrow)"/>
<!-- Agent → Reporter -->
<line x1="467" y1="121" x2="467" y2="173" class="arr-line" marker-end="url(#arrow)"/>

<!-- Analyzer → RAG -->
<path d="M290 110 L280 110 L280 260 L250 260 L250 288" class="arr-line" marker-end="url(#arrow)"/>
<path d="M335 260 L335 288" class="arr-line" marker-end="url(#arrow)"/>
<path d="M400 260 L447 260 L447 288" class="arr-line" marker-end="url(#arrow)"/>
<line x1="275" y1="312" x2="288" y2="312" class="arr-line" marker-end="url(#arrow)"/>
<line x1="380" y1="312" x2="395" y2="312" class="arr-line" marker-end="url(#arrow)"/>

<!-- LC → Webhook -->
<path d="M130 208 L145 208 L145 93 L161 93" class="arr-line" stroke-width="1.4" marker-end="url(#arrow)"/>
<text class="ts" style="fill:#555;" x="137" y="157" text-anchor="middle">webhook</text>

<!-- Agent → 대상 서버 -->
<path d="M517 93 L535 93 L535 208 L548 208" class="arr-line" stroke-width="1.4" marker-end="url(#arrow)"/>
<text class="ts" style="fill:#555;" x="543" y="157" text-anchor="middle">SSH</text>

<!-- Reporter → LC (점선) -->
<path d="M467 219 L467 245 L140 245 L140 222 L132 222" class="arr-dashed" marker-end="url(#arrow)"/>
<text class="ts" style="fill:#888;" x="300" y="258" text-anchor="middle">PATCH · GET · POST</text>

<!-- Scheduler ↔ DB (점선) -->
<path d="M213 410 L213 380 L213 221" class="arr-thin" marker-end="url(#arrow)"/>
</svg>
